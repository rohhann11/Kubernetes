apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ml-app.fullname" . }}-frontend-nginx-config
  labels:
    {{- include "ml-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.frontend.name }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Proxy API Gateway requests (must come before regex locations)
        location /api/ {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.apiGateway.name }}:{{ .Values.apiGateway.port }}/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy model training add-training-data endpoint (must come before regex locations)
        location /training/ {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.modelTraining.name }}:{{ .Values.modelTraining.port }}/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy ML prediction endpoint (must come before regex locations)
        location /predict {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.mlPrediction.name }}:{{ .Values.mlPrediction.port }}/predict;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Generic proxy for hardcoded IP:port patterns (e.g., /172.16.3.104:500X/*)
        # This handles requests from frontend with hardcoded external URLs
        # API Gateway - port 5000
        location ~ ^/\d+\.\d+\.\d+\.\d+:5000/(.*)$ {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.apiGateway.name }}:{{ .Values.apiGateway.port }}/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ML Prediction Service - port 5001
        location ~ ^/\d+\.\d+\.\d+\.\d+:5001/(.*)$ {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.mlPrediction.name }}:{{ .Values.mlPrediction.port }}/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Model Training Service - port 5002
        location ~ ^/\d+\.\d+\.\d+\.\d+:5002/(.*)$ {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.modelTraining.name }}:{{ .Values.modelTraining.port }}/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Data Service - port 5003
        location ~ ^/\d+\.\d+\.\d+\.\d+:5003/(.*)$ {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.dataService.name }}:{{ .Values.dataService.port }}/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy health check endpoints for each service (must come before regex locations)
        location /api-gateway-health {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.apiGateway.name }}:{{ .Values.apiGateway.port }}/health;
            proxy_set_header Host $host;
        }

        location /ml-prediction-health {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.mlPrediction.name }}:{{ .Values.mlPrediction.port }}/health;
            proxy_set_header Host $host;
        }

        location /model-training-health {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.modelTraining.name }}:{{ .Values.modelTraining.port }}/health;
            proxy_set_header Host $host;
        }

        location /data-service-health {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.dataService.name }}:{{ .Values.dataService.port }}/health;
            proxy_set_header Host $host;
        }

        # Serve static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Favicon - return empty to avoid 404
        location = /favicon.ico {
            return 204;
            access_log off;
            log_not_found off;
        }
    }

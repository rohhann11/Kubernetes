server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API Gateway requests
    location /api/ {
        proxy_pass http://kubernetes-ml-app-api-gateway:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy health check endpoints for each service
    location /api-gateway-health {
        proxy_pass http://kubernetes-ml-app-api-gateway:5000/health;
        proxy_set_header Host $host;
    }

    location /ml-prediction-health {
        proxy_pass http://kubernetes-ml-app-ml-prediction:5001/health;
        proxy_set_header Host $host;
    }

    location /model-training-health {
        proxy_pass http://kubernetes-ml-app-model-training-service:5002/health;
        proxy_set_header Host $host;
    }

    location /data-service-health {
        proxy_pass http://kubernetes-ml-app-data-service:5003/health;
        proxy_set_header Host $host;
    }

    # Proxy model training add-training-data endpoint
    location /training/ {
        proxy_pass http://kubernetes-ml-app-model-training-service:5002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Favicon - return empty to avoid 404
    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }
}
